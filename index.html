<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Summit Plumbing — 24/7 Emergency Plumber</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f2740;
      color: #fff;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 1.25rem;
      gap: 1.5rem;
    }
    .hero h1 {
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1.15;
      max-width: 22ch;
    }
    .hero p.sub {
      font-size: clamp(1rem, 3vw, 1.25rem);
      color: #b8c9da;
      max-width: 40ch;
    }
    .call-btn {
      display: inline-block;
      background: #f5a623;
      color: #0f2740;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 700;
      text-decoration: none;
      padding: 1.1rem 2.5rem;
      border-radius: 12px;
    }
    .call-btn:active { background: #d98f14; }
    .trust {
      font-size: 0.95rem;
      color: #8fa6bb;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>Burst pipe? Blocked drain? We're on our way.</h1>
    <p class="sub">Summit Plumbing — 24/7 emergency plumbing, usually at your door within the hour.</p>
    <a class="call-btn" href="tel:555-0100">📞 Call Now: 555-0100</a>
    <p class="trust">Licensed &amp; insured · 4.9★ from 200+ local reviews · No call-out fee</p>
  </main>
</body>
</html>
